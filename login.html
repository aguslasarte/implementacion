<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Cenital</title>
    <script>document.documentElement.setAttribute('data-theme','light');</script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <main class="auth-card">
        <a href="index.html" class="logo auth-logo" aria-label="Cenital, inicio">
            <img src="imagenes/Cenital.svg" alt="Cenital">
        </a>
        <h1>Ingresá a Cenital</h1>
        <p class="auth-sub">Para suscribirte a newsletters, seguir voces y ser parte de Mejores Amigos.</p>

        <form id="login-form" novalidate>
            <div class="form-alert" id="form-alert" role="alert"></div>

            <div class="field" id="field-email">
                <label for="email">Correo Electrónico</label>
                <input class="input" type="email" id="email" name="email" autocomplete="email"
                       placeholder="tucorreo@ejemplo.com">
                <span class="field-error" id="err-email">Ingresá un correo electrónico válido.</span>
            </div>

            <div class="field" id="field-password">
                <label for="password">Contraseña</label>
                <input class="input" type="password" id="password" name="password" autocomplete="current-password">
                <span class="field-error" id="err-password">Ingresá tu contraseña.</span>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="show-pass">
                <label for="show-pass">Mostrar contraseña</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Iniciar Sesión</button>
        </form>

        <p class="auth-alt"><a href="crear-cuenta.html">Si no tenés cuenta, registrate acá</a></p>
    </main>

    <script src="app.js"></script>
    <script>
        var form = document.getElementById("login-form");
        var emailEl = document.getElementById("email");
        var passEl = document.getElementById("password");
        var alertEl = document.getElementById("form-alert");
        var submitBtn = document.getElementById("submit-btn");

        document.getElementById("show-pass").addEventListener("change", function (e) {
            passEl.type = e.target.checked ? "text" : "password";
        });

        function setError(fieldId, on) {
            document.getElementById("field-" + fieldId).classList.toggle("has-error", on);
        }
        function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            alertEl.className = "form-alert";

            var emailOk = validEmail(emailEl.value.trim());
            var passOk = passEl.value.trim().length > 0;
            setError("email", !emailOk);
            setError("password", !passOk);
            if (!emailOk || !passOk) return;

            // Estado loading simulado
            submitBtn.classList.add("is-loading");
            setTimeout(function () {
                // Sesión simulada: recuperamos nombre si la cuenta fue creada en este dispositivo.
                var saved = null;
                try { saved = JSON.parse(localStorage.getItem("cenital.account")); } catch (e) {}
                var firstName = (saved && saved.email === emailEl.value.trim()) ? saved.firstName : emailEl.value.split("@")[0];
                var lastName = (saved && saved.email === emailEl.value.trim()) ? saved.lastName : "";
                window.Cenital.Auth.login({ firstName: firstName, lastName: lastName, email: emailEl.value.trim() });
                window.location.href = "index.html";
            }, 700);
        });

        // Si ya hay sesión activa, no tiene sentido quedarse en el login.
        if (window.Cenital.Auth.isLoggedIn()) window.location.href = "index.html";
    </script>
</body>
</html>

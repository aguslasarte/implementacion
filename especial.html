<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especial — Cenital</title>
    <script>(function(){try{var t=localStorage.getItem('cenital.theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Banner del especial ── */
        .esp-banner {
            position: relative;
            min-height: 260px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            border-radius: var(--radius-lg, 12px);
            margin-bottom: var(--space-40, 2.5rem);
        }
        .esp-banner-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.35);
        }
        .esp-banner-body {
            position: relative;
            z-index: 1;
            padding: var(--space-32, 2rem) var(--space-40, 2.5rem);
            color: #fff;
            width: 100%;
        }
        .esp-banner-eyebrow {
            font-size: var(--fs-caption, .75rem);
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255,255,255,.7);
            margin-bottom: .5rem;
            display: block;
        }
        .esp-banner-title {
            font-family: var(--font-display, serif);
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            margin: 0 0 .5rem;
            line-height: 1.15;
        }
        .esp-banner-desc {
            font-size: var(--fs-body, 1rem);
            color: rgba(255,255,255,.8);
            margin: 0;
            max-width: 54ch;
        }

        /* ── Nota destacada ── */
        .esp-featured {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: var(--space-24, 1.5rem);
            align-items: start;
            margin-bottom: var(--space-40, 2.5rem);
            text-decoration: none;
            color: inherit;
        }
        @media (max-width: 640px) {
            .esp-featured { grid-template-columns: 1fr; }
        }
        .esp-featured-img {
            aspect-ratio: 4/3;
            border-radius: var(--radius-md, 8px);
            background-size: cover;
            background-position: center;
            background-color: var(--surface-2, #eee);
        }
        .esp-featured-body { display: flex; flex-direction: column; gap: .5rem; }
        .esp-featured-title {
            font-family: var(--font-display, serif);
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            line-height: 1.25;
            margin: 0;
            color: var(--text-primary);
        }
        .esp-featured-excerpt {
            font-size: var(--fs-body, 1rem);
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.55;
        }
        .esp-featured-meta {
            font-size: var(--fs-caption, .75rem);
            color: var(--text-tertiary);
            display: flex;
            gap: .5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .esp-featured-meta .author-mini-photo {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--surface-3, #ccc);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        /* ── Sección "Más de…" ── */
        .esp-more-title {
            font-size: var(--fs-label, .85rem);
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin: 0 0 var(--space-20, 1.25rem);
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border-subtle, rgba(0,0,0,.1));
        }
        .esp-article-list { display: flex; flex-direction: column; gap: 0; }

        /* ── Fila de artículo ── */
        .esp-article-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: var(--space-16, 1rem);
            align-items: start;
            padding: var(--space-20, 1.25rem) 0;
            border-bottom: 1px solid var(--border-subtle, rgba(0,0,0,.08));
            text-decoration: none;
            color: inherit;
            transition: opacity .15s;
        }
        .esp-article-row:last-child { border-bottom: none; }
        .esp-article-row:hover { opacity: .78; }
        @media (max-width: 480px) {
            .esp-article-row { grid-template-columns: 88px 1fr; }
        }
        .esp-row-img {
            aspect-ratio: 4/3;
            border-radius: var(--radius-sm, 6px);
            background-size: cover;
            background-position: center;
            background-color: var(--surface-2, #eee);
        }
        .esp-row-body { display: flex; flex-direction: column; gap: .3rem; }
        .esp-row-title {
            font-family: var(--font-display, serif);
            font-size: var(--fs-body, 1rem);
            font-weight: 700;
            line-height: 1.3;
            margin: 0;
            color: var(--text-primary);
        }
        .esp-row-excerpt {
            font-size: var(--fs-small, .875rem);
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.55;
        }
        .esp-row-meta {
            font-size: var(--fs-caption, .75rem);
            color: var(--text-tertiary);
        }

        /* ── Modal de nota ── */
        .note-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            z-index: 900;
            overflow-y: auto;
            padding: var(--space-32, 2rem) var(--space-16, 1rem);
        }
        .note-modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
        .note-modal {
            background: var(--surface-1, #fff);
            color: var(--text-primary);
            border-radius: var(--radius-lg, 12px);
            max-width: 680px;
            width: 100%;
            padding: var(--space-32, 2rem);
            position: relative;
        }
        .note-modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none; border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-tertiary);
            line-height: 1;
        }
        .note-modal-img {
            width: 100%;
            aspect-ratio: 16/7;
            border-radius: var(--radius-md, 8px);
            background-size: cover;
            background-position: center;
            background-color: var(--surface-2);
            margin-bottom: var(--space-16, 1rem);
        }
        .note-modal-title {
            font-family: var(--font-display, serif);
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            font-weight: 700;
            margin: 0 0 .35rem;
            line-height: 1.2;
        }
        .note-modal-meta {
            font-size: var(--fs-caption, .75rem);
            color: var(--text-tertiary);
            margin-bottom: var(--space-16, 1rem);
        }
        .note-modal-body p {
            font-size: var(--fs-body, 1rem);
            line-height: 1.7;
            color: var(--navy-600, #001b37);
            margin: 0 0 1em;
        }
        .note-modal-body p:last-child { margin-bottom: 0; }
        .note-modal-body p.nm-excerpt {
            font-size: 1.05rem;
            line-height: 1.75;
            color: var(--navy-600, #001b37);
        }
    </style>
</head>
<body data-page="especiales">

    <div id="site-header"></div>

    <main class="container" id="especial-root" style="padding-bottom: var(--space-64, 4rem)">
        <a href="especiales.html" class="back-link">&larr; Volver a Especiales</a>
        <div id="especial-content"></div>
    </main>

    <!-- Modal de nota individual -->
    <div class="note-modal-overlay" id="note-modal" role="dialog" aria-modal="true">
        <div class="note-modal">
            <button class="note-modal-close" id="note-modal-close" aria-label="Cerrar">&times;</button>
            <div class="note-modal-img" id="nm-img"></div>
            <h2 class="note-modal-title" id="nm-title"></h2>
            <div class="note-modal-meta" id="nm-meta"></div>
            <div class="note-modal-body" id="nm-body"></div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        try {
            var D = window.CENITAL_DATA;
            if (!D) { document.getElementById("especial-content").innerHTML = '<p>Error: no se cargó data.js</p>'; return; }

            var params = new URLSearchParams(window.location.search);
            var id = params.get("id");
            var special = null;
            for (var i = 0; i < D.SPECIALS.length; i++) {
                if (D.SPECIALS[i].id === id) { special = D.SPECIALS[i]; break; }
            }

            var root = document.getElementById("especial-content");

            if (!special) {
                root.innerHTML = '<div class="placeholder-panel" style="margin-top:2rem">Especial no encontrado. <a href="especiales.html" style="color:var(--text-link)">Volver a Especiales</a></div>';
                return;
            }

            document.title = special.title + " — Especial — Cenital";

            var fa = special.featuredArticle || {};
            var articles = special.articles || [];

            // Banner
            var bannerBg = special.image ? 'style="background-image:url(\'' + special.image + '\')"' : '';
            var statusClass = special.status === "En curso" ? "tag-outline-green" : (special.status === "Archivo" ? "tag-outline-gray" : "tag-outline-red");

            // Nota destacada
            var featImgStyle = fa.image ? 'background-image:url(\'' + fa.image + '\')' : '';
            var featuredHtml = fa.title ? (
                '<div class="esp-featured" id="esp-featured-link" style="cursor:pointer">' +
                    '<div class="esp-featured-img" style="' + featImgStyle + '"></div>' +
                    '<div class="esp-featured-body">' +
                        '<h2 class="esp-featured-title">' + fa.title + '</h2>' +
                        '<p class="esp-featured-excerpt">' + fa.excerpt + '</p>' +
                        '<div class="esp-featured-meta">' +
                            '<span>Por ' + fa.author + '</span>' +
                            '<span>·</span>' +
                            '<span>' + fa.date + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>'
            ) : '';

            // Lista de notas
            var articlesHtml = articles.map(function(a, idx) {
                var imgStyle = a.image ? 'background-image:url(\'' + a.image + '\')' : '';
                return '<div class="esp-article-row" data-article-idx="' + idx + '" style="cursor:pointer">' +
                    '<div class="esp-row-img" style="' + imgStyle + '"></div>' +
                    '<div class="esp-row-body">' +
                        '<h3 class="esp-row-title">' + a.title + '</h3>' +
                        '<p class="esp-row-excerpt">' + a.excerpt + '</p>' +
                        '<span class="esp-row-meta">' + a.date + ' · Por ' + a.author + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');

            root.innerHTML =
                // Banner
                '<div class="esp-banner">' +
                    '<div class="esp-banner-bg" ' + bannerBg + '></div>' +
                    '<div class="esp-banner-body">' +
                        '<span class="esp-banner-eyebrow">' + special.date + '</span>' +
                        '<h1 class="esp-banner-title">' + special.title + '</h1>' +
                        '<p class="esp-banner-desc">' + special.desc + '</p>' +
                    '</div>' +
                '</div>' +
                // Nota destacada
                featuredHtml +
                // Lista
                (articles.length ? (
                    '<p class="esp-more-title">Más de ' + special.title + '</p>' +
                    '<div class="esp-article-list">' + articlesHtml + '</div>'
                ) : '');

            // Click en nota destacada → modal
            var featLink = document.getElementById("esp-featured-link");
            if (featLink && fa.content) {
                featLink.addEventListener("click", function() { openModal(fa); });
            }

            // Click en filas de artículos → modal con contenido real
            root.querySelectorAll(".esp-article-row").forEach(function(row) {
                row.addEventListener("click", function() {
                    var idx = parseInt(row.dataset.articleIdx, 10);
                    openModal(articles[idx]);
                });
            });

        } catch(e) {
            document.getElementById("especial-content").innerHTML = '<p style="color:red">Error: ' + e.message + '</p>';
        }
    });

    function escHtml(str) {
        return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Modal
    var modal = document.getElementById("note-modal");
    document.getElementById("note-modal-close").addEventListener("click", closeModal);
    modal.addEventListener("click", function(e) { if (e.target === modal) closeModal(); });
    document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModal(); });

    function openModal(a) {
        var imgEl = document.getElementById("nm-img");
        imgEl.style.backgroundImage = a.image ? 'url(\'' + a.image + '\')' : '';
        imgEl.style.display = a.image ? '' : 'none';

        document.getElementById("nm-title").textContent = a.title;
        document.getElementById("nm-meta").textContent = 'Por ' + a.author + ' · ' + a.date;

        var bodyEl = document.getElementById("nm-body");
        var hasContent = a.content && a.content.trim().length > 0;
        if (hasContent) {
            var paras = a.content.split(/\n[\s]*\n/);
            bodyEl.innerHTML = paras.map(function(p) {
                var t = p.trim();
                return t ? '<p>' + t + '</p>' : '';
            }).join('');
        } else {
            bodyEl.innerHTML = '<p class="nm-excerpt">' + (a.excerpt || '') + '</p>';
        }

        modal.classList.add("open");
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        modal.classList.remove("open");
        document.body.style.overflow = "";
    }
    </script>
</body>
</html>
